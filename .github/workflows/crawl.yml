name: 定时抓取热搜

on:
  schedule:
    # 每 10 分钟一次（UTC 时间，实际运行可能有 1-3 分钟延迟）
    - cron: '*/10 * * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 安装 Python 依赖
        run: uv sync --frozen

      - name: 抓取热搜并写入 Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          uv run python -c "
          import sys, io
          sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')
          from spider import crawl_and_save
          counts = crawl_and_save()
          total = sum(counts.values())
          print(f'抓取完成: {counts}, 共 {total} 条')
          "

      - name: AI 舆情分析
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          uv run python -c "
          import sys, io
          sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')
          from ai_analyzer import run_analysis_all
          from spider import FETCHERS
          results = run_analysis_all(list(FETCHERS.keys()))
          total = sum(results.values())
          print(f'AI 分析完成: {results}, 共 {total} 条')
          "
